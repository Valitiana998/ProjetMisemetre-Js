<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un Objectif - Finance Manager</title>
    <link rel="stylesheet" href="../css/main.css">
    <script src="../js/add-goals.js"></script>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header"><h1>AR Finance Manager</h1></div>
            <nav class="sidebar-menu">
           <a href="../../index.html" class="menu-item active">Tableau de Bord</a>
                <a href="transactions.html" class="menu-item">Budget</a>
                <a href="goals.html" class="menu-item"> Objectif</a>
                <a href="reports.html" class="menu-item">A venir</a>
                <a href="historique.html" class="menu-item">historique</a>
                <a href="settings.html" class="menu-item">Paramètres</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h2>Ajouter une Transaction</h2>
                <p>Enregistrez une nouvelle transaction</p>
            </div>

            <div class="form-container">
                <form class="transaction-form" id="transactionForm">
                    <div class="form-section">
                        <label class="section-title">Type de Transaction</label>
                        <div class="type-options">
                            <button type="button" class="btn btn-type active" data-type="expense">Dépense</button>
                            <button type="button" class="btn btn-type" data-type="income">Revenu</button>
                        </div>
                        <input type="hidden" id="transactionType" name="type" value="expense">
                    </div>

                    <div class="form-section">
                        <label for="category" class="section-title">Catégorie</label>
                        <select id="category" name="category" class="form-select" required>
                            <option value="">Sélectionner une catégorie</option>
                            <optgroup label="Dépenses Courantes">
                                <option value="housing">🏠 Logement</option>
                                <option value="transport">🚗 Transport</option>
                                <option value="food">🍔 Alimentation</option>
                                <option value="utilities">💡 Électricité & Eau</option>
                                <option value="entertainment">🎬 Divertissement</option>
                            </optgroup>
                            <optgroup label="Autres Catégories">
                                <option value="shopping">🛍️ Shopping</option>
                                <option value="health">🏥 Santé</option>
                                <option value="education">📚 Éducation</option>
                                <option value="other">📌 Autre</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="form-section">
                        <label for="amount" class="section-title">Montant</label>
                        <div class="amount-input-group">
                            <span class="currency">Ar</span>
                            <input type="number" id="amount" name="amount" placeholder="0.00" step="0.01" min="0.01" required class="form-input amount-input">
                        </div>
                    </div>

                    <div class="form-section">
                        <label for="date" class="section-title">Date</label>
                        <input type="date" id="date" name="date" required class="form-input">
                    </div>
                    <div class="form-section">
                        <label for="description" class="section-title">Description (Optionnel)</label>
                        <textarea id="description" name="description" placeholder="Ajouter une note..." class="form-textarea" rows="3"></textarea>
                    </div>
                <div class="form-actions">
                        <a href="goals.html" class="btn btn-secondary">Annuler</a>
                        <button type="submit" class="btn btn-primary">Ajouter la Transaction</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script src="../js/addObjectif.js"></script>
</body>
</html>
