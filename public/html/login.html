<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Finance Manager</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Finance Manager</h1>
                <p>Gérez vos finances simplement</p>
            </div>

            <form class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        Se souvenir de moi
                    </label>
                    <a href="#" class="forgot-password">Mot de passe oublié?</a>
                </div>

                <button type="submit" class="login-btn">Se connecter</button>
            </form>

            <div class="divider">ou</div>

            <div class="social-login">
                <button class="social-btn google">
                    <span>Google</span>
                </button>
                <button class="social-btn facebook">
                    <span>Facebook</span>
                </button>
            </div>

            <div class="signup-link">
                Pas encore de compte? <a href="#">S'inscrire</a>
            </div>
        </div>

        <div class="login-illustration">
            <div class="illustration-content">
                <div class="chart-circle">
                    <svg viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#5b7fd4" stroke-width="2" stroke-dasharray="141 141" opacity="0.3"></circle>
                        <circle cx="50" cy="50" r="35" fill="none" stroke="#1bc47d" stroke-width="2" stroke-dasharray="110 110" opacity="0.3"></circle>
                        <circle cx="50" cy="50" r="25" fill="none" stroke="#ffa500" stroke-width="2" stroke-dasharray="79 79" opacity="0.3"></circle>
                    </svg>
                </div>
                <h2>Bienvenue!</h2>
                <p>Commencez à gérer vos finances dès maintenant</p>
            </div>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
