<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter une Dépense - Finance Manager</title>
    <link rel="stylesheet" href="../css/addDepense.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-text">Ar Finance Manger</div>
            </div>
            <nav>
                <a href="../index.html" class="menu-item">Tableau de Bord</a>
                <a href="transactions.html" class="menu-item">Budget</a>
                <a href="goals.html" class="menu-item">Objectif</a>
                <a href="reports.html" class="menu-item active">À venir</a>
                <a href="historique.html" class="menu-item">Historique</a>
                <a href="settings.html" class="menu-item">Paramètres</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="header">
                <div class="header-title">
                    <h1>Ajouter une Dépense</h1>
                    <p>Enregistrez une nouvelle charge ou dépense</p>
                </div>
                <a href="../index.html" class="btn-secondary">
                    <span>← Retour</span>
                </a>
            </div>

            <div class="form-wrapper">
                <form id="expenseForm" class="expense-form">
                    <div class="form-grid">
                        <!-- Titre -->
                        <div class="form-group full-width">
                            <label for="title">Titre de la dépense *</label>
                            <input type="text" id="title" name="title" required placeholder="Ex: Loyer, Électricité, Netflix...">
                        </div>

                        <!-- Montant -->
                        <div class="form-group">
                            <label for="amount">Montant (Ar) *</label>
                            <div class="input-with-icon">
                                <span class="currency">Ar</span>
                                <input type="number" id="amount" name="amount" required min="1"  placeholder="0">
                            </div>
                        </div>

                        <!-- Date -->
                        <div class="form-group">
                            <label for="date">Date *</label>
                            <input type="date" id="date" name="date" required>
                        </div>

                        <!-- Catégorie -->
                        <div class="form-group">
                            <label for="category">Catégorie *</label>
                            <select id="category" name="category" required>
                                <option value="">Sélectionner...</option>
                                <option value="Logement">🏠 Logement</option>
                                <option value="Transport">🚗 Transport</option>
                                <option value="Alimentation">🍔 Alimentation</option>
                                <option value="Loisirs">🎬 Loisirs</option>
                                <option value="Électricité & Eau">💡 Électricité & Eau</option>
                                <option value="Santé">🏥 Santé</option>
                                <option value="Éducation">📚 Éducation</option>
                                <option value="Shopping">🛍️ Shopping</option>
                                <option value="Dette">💳 Dette</option>
                                <option value="Autre">📌 Autre</option>
                            </select>
                        </div>

                        <!-- Fréquence -->
                        <div class="form-group">
                            <label for="frequency">Fréquence *</label>
                            <select id="frequency" name="frequency" required>
                                <option value="Unique">Unique</option>
                                <option value="Hebdomadaire">Hebdomadaire</option>
                                <option value="Mensuel" selected>Mensuel</option>
                                <option value="Trimestriel">Trimestriel</option>
                                <option value="Annuel">Annuel</option>
                            </select>
                        </div>

                        <!-- Mode de paiement -->
                        <div class="form-group">
                            <label for="payment">Mode de paiement *</label>
                            <select id="payment" name="payment" required>
                                <option value="Prélèvement automatique">Prélèvement automatique</option>
                                <option value="Carte bancaire">Carte bancaire</option>
                                <option value="Virement">Virement</option>
                                <option value="Espèces">Espèces</option>
                                <option value="Mobile Money">Mobile Money</option>
                            </select>
                        </div>

                        <!-- Description -->
                        <div class="form-group full-width">
                            <label for="description">Description (Optionnel)</label>
                            <textarea id="description" name="description" rows="3" placeholder="Ajouter des détails supplémentaires..."></textarea>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a href="reports.html" class="btn btn-secondary">Annuler</a>
                        <button type="submit" class="btn btn-primary">
                            <span>+</span>
                            <span>Ajouter la Dépense</span>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>


</body>
<script src="../js/addDepense.js"></script>
</html>
